<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM GRIND — Progress Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --maths: #f0c040;
    --physics: #40a8f0;
    --chem: #50e0a0;
    --red: #ff4444;
    --text: #f0f0f0;
    --muted: #666;
    --exam-date: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 0 20px;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--text);
  }

  .logo span { color: var(--maths); }

  .countdown-pill {
    background: var(--surface2);
    border: 1px solid var(--exam-date);
    border-radius: 100px;
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--exam-date);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .countdown-pill .dot {
    width: 6px; height: 6px;
    background: var(--exam-date);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* OVERALL PROGRESS */
  .overall-section {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.maths::before { background: var(--maths); }
  .stat-card.physics::before { background: var(--physics); }
  .stat-card.chem::before { background: var(--chem); }
  .stat-card.overall::before { background: linear-gradient(90deg, var(--maths), var(--physics), var(--chem)); }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card.maths .stat-value { color: var(--maths); }
  .stat-card.physics .stat-value { color: var(--physics); }
  .stat-card.chem .stat-value { color: var(--chem); }
  .stat-card.overall .stat-value { color: var(--text); }

  .stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  .overall-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .bar-label { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--maths), var(--physics), var(--chem));
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text); }

  /* WEEK TABS */
  .week-section { padding: 32px 0; }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover { border-color: #444; color: var(--text); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

  /* WEEK CONTENT */
  .week-panel { display: none; }
  .week-panel.active { display: block; }

  .week-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .week-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; }
  .week-focus { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

  .week-progress-ring {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ring-label { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); text-align: right; }
  .ring-pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--text); }

  /* DAYS GRID */
  .days-grid { display: flex; flex-direction: column; gap: 12px; }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card:hover { border-color: #333; }
  .day-card.completed { border-color: #2a2a2a; }
  .day-card.today { border-color: var(--maths); }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    gap: 16px;
  }

  .day-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }

  .day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--muted);
    min-width: 40px;
    line-height: 1;
  }

  .day-card.today .day-num { color: var(--maths); }

  .day-info { flex: 1; min-width: 0; }
  .day-name { font-weight: 600; font-size: 0.9rem; }
  .day-date { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  .day-subjects { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  .subj-tag {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .subj-tag.m { background: rgba(240,192,64,0.15); color: var(--maths); }
  .subj-tag.p { background: rgba(64,168,240,0.15); color: var(--physics); }
  .subj-tag.c { background: rgba(80,224,160,0.15); color: var(--chem); }

  .day-actions { display: flex; align-items: center; gap: 10px; }

  .complete-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .complete-btn:hover { border-color: var(--chem); }
  .complete-btn.done { background: var(--chem); border-color: var(--chem); }
  .complete-btn svg { width: 14px; height: 14px; }

  .chevron {
    color: var(--muted);
    transition: transform 0.3s;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .day-card.open .chevron { transform: rotate(180deg); }

  /* DAY TASKS */
  .day-tasks {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }

  .day-card.open .day-tasks { display: block; }

  .tasks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-top: 16px; }

  .subject-block { background: var(--surface2); border-radius: 10px; padding: 16px; }

  .subject-block-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .subject-block-title.m { color: var(--maths); }
  .subject-block-title.p { color: var(--physics); }
  .subject-block-title.c { color: var(--chem); }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 0.82rem;
    line-height: 1.4;
    color: #ccc;
  }

  .task-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
    appearance: none;
    -webkit-appearance: none;
    position: relative;
  }

  .task-check:checked { background: var(--chem); border-color: var(--chem); }
  .task-check:checked::after {
    content: '✓';
    position: absolute;
    top: -1px; left: 1px;
    font-size: 11px;
    color: #000;
    font-weight: 700;
  }

  .task-text { flex: 1; }
  .task-text.done { text-decoration: line-through; color: var(--muted); }

  .hours-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-top: 1px;
    flex-shrink: 0;
  }

  /* NOTES */
  .day-notes { margin-top: 12px; }
  .notes-label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; margin-bottom: 6px; }
  .notes-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text);
    resize: vertical;
    min-height: 60px;
    transition: border-color 0.2s;
  }
  .notes-input:focus { outline: none; border-color: #444; }
  .notes-input::placeholder { color: var(--muted); }

  /* TODAY BADGE */
  .today-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    background: var(--maths);
    color: #000;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* MOTIVATION BAR */
  .motive-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--maths);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 0.85rem;
    color: #aaa;
    font-style: italic;
    line-height: 1.5;
  }

  .motive-bar strong { color: var(--maths); font-style: normal; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .logo { font-size: 1.5rem; }
    .stat-value { font-size: 2rem; }
    .week-title { font-size: 1.6rem; }
    .tasks-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ============================================================
// STATE
// ============================================================
let state = JSON.parse(localStorage.getItem('examgrind') || '{}');

function save() { localStorage.setItem('examgrind', JSON.stringify(state)); }

function getKey(week, day, subj, task) { return `w${week}_d${day}_${subj}_t${task}`; }
function getDayKey(week, day) { return `w${week}_d${day}_done`; }
function getNoteKey(week, day) { return `w${week}_d${day}_note`; }

// ============================================================
// COUNTDOWN
// ============================================================
function updateCountdown() {
  const now = new Date();
  const diff = EXAM_DATE - now;
  if (diff <= 0) { document.getElementById('countdown-text').textContent = 'EXAM DAY!'; return; }
  const days = Math.floor(diff / 86400000);
  const hrs = Math.floor((diff % 86400000) / 3600000);
  document.getElementById('countdown-text').textContent = `${days}d ${hrs}h to Exam`;
}

// ============================================================
// STATS
// ============================================================
function calcStats() {
  let total = 0, done = 0;
  let mTotal = 0, mDone = 0;
  let pTotal = 0, pDone = 0;
  let cTotal = 0, cDone = 0;
  let daysDone = 0, totalDays = 0;

  weeks.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      totalDays++;
      if (state[getDayKey(wi, di)]) daysDone++;
      ['m','p','c'].forEach(subj => {
        const tasks = d.tasks[subj] || [];
        tasks.forEach((_, ti) => {
          total++;
          if (subj === 'm') mTotal++;
          if (subj === 'p') pTotal++;
          if (subj === 'c') cTotal++;
          if (state[getKey(wi, di, subj, ti)]) {
            done++;
            if (subj === 'm') mDone++;
            if (subj === 'p') pDone++;
            if (subj === 'c') cDone++;
          }
        });
      });
    });
  });

  const pct = v => Math.round(v * 100) + '%';
  document.getElementById('maths-pct').textContent = pct(mTotal ? mDone/mTotal : 0);
  document.getElementById('physics-pct').textContent = pct(pTotal ? pDone/pTotal : 0);
  document.getElementById('chem-pct').textContent = pct(cTotal ? cDone/cTotal : 0);
  document.getElementById('overall-pct').textContent = `${daysDone}/${totalDays}`;
  const totalPct = total ? Math.round(done/total*100) : 0;
  document.getElementById('total-pct').textContent = totalPct + '%';
  document.getElementById('total-bar').style.width = totalPct + '%';
}

// ============================================================
// RENDER
// ============================================================
const colors = { m: 'var(--maths)', p: 'var(--physics)', c: 'var(--chem)' };
const labels = { m: 'MATHS', p: 'PHYSICS', c: 'CHEMISTRY' };

function isToday(dateStr) {
  const today = new Date();
  const d = new Date(dateStr + ' 2026');
  return d.toDateString() === today.toDateString();
}

function renderWeek(wi) {
  const w = weeks[wi];
  let html = `
    <div class="motive-bar">
      <strong>Week ${wi+1} Focus:</strong> ${w.focus}
    </div>
    <div class="week-header">
      <div>
        <div class="week-title">${w.title}</div>
        <div class="week-focus">${w.days[0].date} — ${w.days[w.days.length-1].date}</div>
      </div>
    </div>
    <div class="days-grid">
  `;

  w.days.forEach((d, di) => {
    const dayDone = state[getDayKey(wi, di)];
    const todayFlag = isToday(d.date);
    const note = state[getNoteKey(wi, di)] || '';
    const allTasks = ['m','p','c'].flatMap(s => (d.tasks[s]||[]).map((_,ti) => getKey(wi,di,s,ti)));
    const doneCount = allTasks.filter(k => state[k]).length;

    html += `
      <div class="day-card ${dayDone?'completed':''} ${todayFlag?'today':''}" id="dc-${wi}-${di}">
        <div class="day-header" onclick="toggleDay(${wi},${di})">
          <div class="day-left">
            <div class="day-num">${String(di+1+wi*7).padStart(2,'0')}</div>
            <div class="day-info">
              <div class="day-name">${d.name} ${todayFlag ? '<span class="today-badge">TODAY</span>' : ''}</div>
              <div class="day-date">${d.date} &nbsp;·&nbsp; ${doneCount}/${allTasks.length} tasks</div>
              <div class="day-subjects">
                <span class="subj-tag m">MATHS 3.5h</span>
                <span class="subj-tag p">PHYSICS 3h</span>
                <span class="subj-tag c">CHEM 2.5h</span>
              </div>
            </div>
          </div>
          <div class="day-actions">
            <button class="complete-btn ${dayDone?'done':''}" onclick="toggleDayDone(event,${wi},${di})" title="Mark day complete">
              <svg viewBox="0 0 24 24" fill="none" stroke="${dayDone?'#000':'var(--muted)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </button>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="day-tasks">
          <div class="tasks-grid">
    `;

    ['m','p','c'].forEach(subj => {
      html += `<div class="subject-block">
        <div class="subject-block-title ${subj}">${labels[subj]}</div>`;
      (d.tasks[subj]||[]).forEach((task, ti) => {
        const k = getKey(wi,di,subj,ti);
        const checked = state[k];
        html += `
          <div class="task-item">
            <input type="checkbox" class="task-check" ${checked?'checked':''} onchange="toggleTask('${k}',this)">
            <span class="task-text ${checked?'done':''}">${task}</span>
          </div>`;
      });
      html += `</div>`;
    });

    html += `</div>
          <div class="day-notes">
            <div class="notes-label">// NOTES FOR THIS DAY</div>
            <textarea class="notes-input" placeholder="Write your notes, struggles, or wins for today..." onchange="saveNote(${wi},${di},this.value)">${note}</textarea>
          </div>
        </div>
      </div>`;
  });

  html += '</div>';
  return html;
}

function toggleDay(wi, di) {
  const card = document.getElementById(`dc-${wi}-${di}`);
  card.classList.toggle('open');
}

function toggleDayDone(e, wi, di) {
  e.stopPropagation();
  const k = getDayKey(wi, di);
  state[k] = !state[k];
  save();
  renderAll();
}

function toggleTask(k, el) {
  state[k] = el.checked;
  save();
  calcStats();
  const label = el.nextElementSibling;
  if (label) label.classList.toggle('done', el.checked);
}

function saveNote(wi, di, val) {
  state[getNoteKey(wi, di)] = val;
  save();
}

let currentWeek = 0;

function showWeek(wi) {
  currentWeek = wi;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===wi));
  document.querySelectorAll('.week-panel').forEach((p,i) => p.classList.toggle('active', i===wi));
}

function renderAll() {
  const container = document.getElementById('week-panels');
  container.innerHTML = weeks.map((w,wi) => `
    <div class="week-panel ${wi===currentWeek?'active':''}" id="wp-${wi}">
      ${renderWeek(wi)}
    </div>
  `).join('');
  calcStats();
  // Re-attach tab logic
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.onclick = () => showWeek(i);
  });
}

// ============================================================
// INIT
// ============================================================
updateCountdown();
setInterval(updateCountdown, 60000);
renderAll();

// Auto-open today's day
weeks.forEach((w, wi) => {
  w.days.forEach((d, di) => {
    if (isToday(d.date)) {
      showWeek(wi);
      setTimeout(() => {
        const card = document.getElementById(`dc-${wi}-${di}`);
        if (card) card.classList.add('open');
        card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  });
});
